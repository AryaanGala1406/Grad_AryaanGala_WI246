<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Bank - SPA</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        html,
        body {
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            background: #f1f4f9;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .main-wrapper {
            flex: 1;
        }

        .sidebar {
            background: #1f2937;
            min-height: 100%;
        }

        .sidebar .nav-link {
            color: #cbd5e1;
            cursor: pointer;
            border-radius: 6px;
        }

        .sidebar .nav-link:hover {
            background: #374151;
            color: white;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        footer {
            background: #111827;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">OUR BANK</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" onclick="loadHome()">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" onclick="loadAbout()">About</a>
                    </li>

                    <!-- Services Dropdown -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            Services
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" onclick="loadLoan()">Loan</a></li>
                            <li><a class="dropdown-item" onclick="loadDeposit()">Deposit</a></li>
                            <li><a class="dropdown-item" onclick="loadAccount()">Open Account</a></li>
                        </ul>
                    </li>

                    <!-- NetBanking Dropdown -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            NetBanking
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" onclick="showLogin()">Login</a></li>
                            <li><a class="dropdown-item" onclick="showSignup()">Signup</a></li>
                        </ul>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" onclick="loadContact()">Contact</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">
                <div id="content"></div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-3 mt-auto">
        www.ourbank.com | © 2026 All Rights Reserved
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        /* HOME */
        function loadHome() {
            content.innerHTML = `
                <div class="card p-4 text-center">
                    <h3>Welcome to Our Bank</h3>
                    <p>Secure and reliable banking services at your fingertips.</p>
                </div>`;
        }
        loadHome();

        /* ABOUT */
        function loadAbout() {
            content.innerHTML = `
                <div class="card p-4 text-center">
                    <h3>About Us</h3>
                    <p>Serving customers since 1995 with trusted financial solutions.</p>
                </div>`;
        }

        /* CONTACT */
        function loadContact() {
            content.innerHTML = `
                <div class="card p-4">
                    <h4 class="text-center mb-4">Contact Us</h4>

                    <div class="row">

                        <!-- Contact Details -->
                        <div class="col-md-5 border-end">
                            <h5>Our Bank Details</h5>
                            <p class="mb-2"><strong>Address:</strong><br>
                            401, Financial Tower,<br>
                            Bandra Kurla Complex,<br>
                            Mumbai, Maharashtra - 400051</p>

                            <p class="mb-2"><strong>Phone:</strong><br>
                            +91 98765 43210</p>

                            <p class="mb-2"><strong>Email:</strong><br>
                            support@ourbank.com</p>

                            <p class="mb-2"><strong>Working Hours:</strong><br>
                            Mon - Fri : 9:00 AM - 6:00 PM</p>

                            <p><strong>Website:</strong><br>
                            www.ourbank.com</p>
                        </div>

                        <!-- Contact Form -->
                        <div class="col-md-7">
                            <input class="form-control mb-3" id="cname" placeholder="Your Name">
                            <input class="form-control mb-3" id="cemail" placeholder="Your Email">
                            <textarea class="form-control mb-3" id="cmsg" rows="4" placeholder="Your Message"></textarea>
                            <button class="btn btn-primary w-100" onclick="validateContact()">Submit</button>
                            <div id="contactMsg" class="mt-3"></div>
                        </div>

                    </div>
                </div>`;
        }

        function validateContact() {
            let name = cname.value.trim();
            let email = cemail.value.trim();
            let msg = cmsg.value.trim();

            if (name.length < 3)
                contactMsg.innerHTML = `<div class="alert alert-danger">Enter valid name</div>`;
            else if (!email.includes("@"))
                contactMsg.innerHTML = `<div class="alert alert-danger">Enter valid email</div>`;
            else if (msg.length < 5)
                contactMsg.innerHTML = `<div class="alert alert-danger">Message too short</div>`;
            else
                contactMsg.innerHTML = `<div class="alert alert-success">Message submitted successfully!</div>`;
        }

        /* LOAN */
        function loadLoan() {
            content.innerHTML = `
                <div class="card p-4">
                    <h4 class="text-center">Loan Calculator</h4>
                    <input class="form-control mb-3" id="applicant" placeholder="Applicant Name">
                    <select class="form-select mb-3" id="loanType" onchange="setInterest()">
                        <option value="">Select Loan Type</option>
                        <option value="HOME">Home</option>
                        <option value="CAR">Car</option>
                        <option value="PERSONAL">Personal</option>
                    </select>
                    <input class="form-control mb-3" id="interest" placeholder="Interest %" readonly>
                    <input class="form-control mb-3" id="amount" placeholder="Amount">
                    <input class="form-control mb-3" id="duration" placeholder="Years">
                    <button class="btn btn-primary" onclick="calculateEMI()">Calculate EMI</button>
                    <div id="loanMessage" class="mt-3"></div>
                </div>`;
        }

        function setInterest() {
            if (loanType.value == "HOME") interest.value = 9;
            else if (loanType.value == "CAR") interest.value = 12;
            else if (loanType.value == "PERSONAL") interest.value = 15;
            else interest.value = "";
        }

        function calculateEMI() {
            let name = applicant.value.trim();
            let type = loanType.value;
            let amt = parseFloat(amount.value);
            let years = parseInt(duration.value);
            let rate = parseFloat(interest.value);

            if (name.length < 5)
                loanMessage.innerHTML = `<div class="alert alert-danger">Name must be 5+ characters</div>`;
            else if (type == "")
                loanMessage.innerHTML = `<div class="alert alert-danger">Select loan type</div>`;
            else if (isNaN(amt) || amt <= 0)
                loanMessage.innerHTML = `<div class="alert alert-danger">Enter valid amount</div>`;
            else if (isNaN(years) || years <= 0)
                loanMessage.innerHTML = `<div class="alert alert-danger">Enter valid duration</div>`;
            else {
                let mRate = rate / 12 / 100;
                let months = years * 12;
                let emi = (amt * mRate * Math.pow(1 + mRate, months)) / (Math.pow(1 + mRate, months) - 1);
                loanMessage.innerHTML = `<div class="alert alert-success">EMI is ₹ ${emi.toFixed(2)}</div>`;
            }
        }

        /* DEPOSIT */
        function loadDeposit() {
            content.innerHTML = `
                <div class="card p-4">
                    <h4 class="text-center">Fixed Deposit</h4>
                    <input class="form-control mb-3" id="fdAmt" placeholder="Amount">
                    <input class="form-control mb-3" id="fdYears" placeholder="Years">
                    <button class="btn btn-primary" onclick="validateFD()">Calculate</button>
                    <div id="fdMsg" class="mt-3"></div>
                </div>`;
        }

        function validateFD() {
            let amt = parseFloat(fdAmt.value);
            let years = parseInt(fdYears.value);

            if (isNaN(amt) || amt < 1000)
                fdMsg.innerHTML = `<div class="alert alert-danger">Minimum FD amount ₹1000</div>`;
            else if (isNaN(years) || years < 1)
                fdMsg.innerHTML = `<div class="alert alert-danger">Minimum duration 1 year</div>`;
            else {
                let maturity = amt * Math.pow(1.07, years);
                fdMsg.innerHTML = `<div class="alert alert-success">Maturity Amount ₹ ${maturity.toFixed(2)}</div>`;
            }
        }

        /* ACCOUNT */
        function loadAccount() {
            content.innerHTML = `
                <div class="card p-4">
                    <h4 class="text-center">Open Account</h4>
                    <select class="form-select mb-3" id="accType">
                        <option value="">Select Type</option>
                        <option>Savings</option>
                        <option>Current</option>
                    </select>
                    <input class="form-control mb-3" id="accName" placeholder="Name">
                    <input class="form-control mb-3" id="accAmt" placeholder="Initial Deposit">
                    <button class="btn btn-primary" onclick="validateAccount()">Submit</button>
                    <div id="accMsg" class="mt-3"></div>
                </div>`;
        }

        function validateAccount() {
            let type = accType.value;
            let name = accName.value.trim();
            let amt = parseFloat(accAmt.value);

            if (type == "")
                accMsg.innerHTML = `<div class="alert alert-danger">Select account type</div>`;
            else if (name.length < 5)
                accMsg.innerHTML = `<div class="alert alert-danger">Name must be 5+ characters</div>`;
            else if (isNaN(amt) || amt < 500)
                accMsg.innerHTML = `<div class="alert alert-danger">Minimum deposit ₹500</div>`;
            else
                accMsg.innerHTML = `<div class="alert alert-success">Account created successfully!</div>`;
        }

        /* LOGIN */
        function showLogin() {
            content.innerHTML = `
                <div class="card p-4">
                    <h4 class="text-center">Login</h4>
                    <input class="form-control mb-3" id="loginUser" placeholder="Username">
                    <input type="password" class="form-control mb-3" id="loginPass" placeholder="Password">
                    <button class="btn btn-primary w-100" onclick="validateLogin()">Login</button>
                    <div id="loginMsg" class="mt-3"></div>
                </div>`;
        }

        function validateLogin() {
            let user = loginUser.value.trim();
            let pass = loginPass.value.trim();

            if (user.length < 4)
                loginMsg.innerHTML = `<div class="alert alert-danger">Invalid username</div>`;
            else if (pass.length < 6)
                loginMsg.innerHTML = `<div class="alert alert-danger">Password must be 6+ characters</div>`;
            else
                loginMsg.innerHTML = `<div class="alert alert-success">Login Successful!</div>`;
        }

        /* SIGNUP */
        function showSignup() {
            content.innerHTML = `
                <div class="card p-4">
                    <h4 class="text-center">Create Account</h4>
                    <input class="form-control mb-3" id="regName" placeholder="Name">
                    <input class="form-control mb-3" id="regEmail" placeholder="Email">
                    <input type="password" class="form-control mb-3" id="regPass" placeholder="Password">
                    <input type="password" class="form-control mb-3" id="regCpass" placeholder="Confirm Password">
                    <button class="btn btn-success w-100" onclick="validateSignup()">Register</button>
                    <div id="regMsg" class="mt-3"></div>
                </div>`;
        }

        function validateSignup() {
            let name = regName.value.trim();
            let email = regEmail.value.trim();
            let pass = regPass.value;
            let cpass = regCpass.value;

            if (name.length < 5)
                regMsg.innerHTML = `<div class="alert alert-danger">Name must be 5+ characters</div>`;
            else if (!email.includes("@"))
                regMsg.innerHTML = `<div class="alert alert-danger">Enter valid email</div>`;
            else if (pass.length < 6)
                regMsg.innerHTML = `<div class="alert alert-danger">Password must be 6+ characters</div>`;
            else if (pass !== cpass)
                regMsg.innerHTML = `<div class="alert alert-danger">Passwords do not match</div>`;
            else
                regMsg.innerHTML = `<div class="alert alert-success">Registration Successful!</div>`;
        }

    </script>

</body>

</html>
